<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matthew Lundeen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="img/favicon.ico">
    <style>
        #parallax-image {
            position: fixed;
            top: -5%;
            left: 0;
            width: 100%;
            height: 110%;
            background-image: url('/img/background.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center top;
            z-index: -1;
            will-change: transform;
        }
    </style>
</head>
<body class="text-white bg-indigo-950">
    <div id="parallax-image"></div>

    <div class="relative p-40">
        
    </div>

    <script>
        const parallaxImage = document.getElementById('parallax-image');
        const content = document.body;

        window.addEventListener('scroll', () => {
            const scrollTop = window.scrollY;
            const contentHeight = content.scrollHeight - window.innerHeight;
            const parallaxOffset = (scrollTop / contentHeight) * 15 * (window.devicePixelRatio || 1);

            parallaxImage.style.backgroundPositionY = `${parallaxOffset}%`;
        });
    </script>
</body>
</html>
