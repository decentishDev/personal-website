<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Contributions</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            padding: 20px;
        }
        h1 {
            color: #333;
        }
        #calendar {
            margin: 20px auto;
            max-width: 1000px;
        }
    </style>
    <!-- Include GitHub Calendar CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-calendar@latest/dist/github-calendar.min.css">
</head>
<body>
    <h1>GitHub Contributions for decentishdev</h1>
    <div id="calendar">Loading...</div>

    <!-- Include GitHub Calendar JS -->
    <script src="https://cdn.jsdelivr.net/npm/github-calendar@latest/dist/github-calendar.min.js"></script>
    <script>
        // Initialize GitHub Calendar
        GitHubCalendar("#calendar", "decentishdev", { responsive: true });
    </script>
</body>
</html>
